apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix
  namespace: cross-ns

spec:
  stripPrefix:
    prefixes:
      - /stripit

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: inner-weighted
  namespace: default

spec:
  weighted:
    services:
      - name: whoami
        port: 80
        weight: 1

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: outer-weighted
  namespace: default

spec:
  weighted:
    services:
      - name: inner-weighted
        kind: TraefikService
        weight: 1
        middlewares:
          - name: stripprefix
            namespace: cross-ns

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: test.route
  namespace: default

spec:
  entryPoints:
    - foo

  routes:
    - match: Host(`foo.com`) && PathPrefix(`/bar`)
      kind: Rule
      priority: 12
      services:
        - name: outer-weighted
          kind: TraefikService
