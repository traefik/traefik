apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-main
  namespace: default

spec:
  stripPrefix:
    prefixes:
      - /mainstrip

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-fallback
  namespace: default

spec:
  stripPrefix:
    prefixes:
      - /fallbackstrip

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: inner-main
  namespace: default

spec:
  weighted:
    services:
      - name: whoami
        port: 80
        weight: 1

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: inner-fallback
  namespace: default

spec:
  weighted:
    services:
      - name: whoami
        port: 80
        weight: 1

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: outer-failover
  namespace: default

spec:
  failover:
    service:
      name: inner-main
      kind: TraefikService
      middlewares:
        - name: stripprefix-main
    fallback:
      name: inner-fallback
      kind: TraefikService
      middlewares:
        - name: stripprefix-fallback

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: test.route
  namespace: default

spec:
  entryPoints:
    - web

  routes:
    - match: Host(`foo.com`) && PathPrefix(`/bar`)
      kind: Rule
      priority: 12
      services:
        - name: outer-failover
          kind: TraefikService
