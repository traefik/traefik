---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-with-wildcard-host-tls
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: "*.localhost"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
  tls:
    - hosts:
        - "*.localhost"
      secretName: whoami-tls
