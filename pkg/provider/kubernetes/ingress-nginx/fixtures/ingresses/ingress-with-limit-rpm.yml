---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-with-limit-rpm
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/limit-rpm: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: whoami.localhost
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: whoami
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-with-limit-rpm-zero
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/limit-rpm: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: whoami-zero.localhost
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: whoami
                port:
                  number: 80
