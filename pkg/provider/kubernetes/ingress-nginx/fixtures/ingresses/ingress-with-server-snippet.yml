---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ingress-with-server-snippet
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Server-Snippet "server-value";

spec:
  ingressClassName: nginx
  rules:
    - host: snippet.localhost
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: whoami
                port:
                  number: 80