---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-with-service-unavailable-http
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: whoami.localhost
      http:
        paths:
          - backend:
              service:
                name: unavailable
                port:
                  number: 80
            path: /
            pathType: Prefix
