apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-with-hostless-rule-and-default-backend
  namespace: default
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: whoami
      port:
        number: 80
  rules:
    - http:
        paths:
          - path: /web
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80