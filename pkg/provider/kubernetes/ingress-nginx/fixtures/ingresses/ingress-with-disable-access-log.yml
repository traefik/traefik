---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-with-disable-access-log
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/enable-access-log: "false"

spec:
  ingressClassName: nginx
  rules:
    - host: noaccesslog.localhost
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: whoami
                port:
                  number: 80
