kind: Service
apiVersion: v1
metadata:
  name: whoami
  namespace: default

spec:
  clusterIP: 10.10.10.1
  ports:
    - name: web
      protocol: TCP
      port: 80
      targetPort: web
  selector:
    app: whoami

