---
apiVersion: v1
kind: Secret
metadata:
  name: supersecret
  namespace: default

data:
  tls.crt: 
  tls.key: 

---
apiVersion: v1
kind: Secret
metadata:
  name: supersecret2
  namespace: default

data:
  tls.crt: 
  tls.key: 

---
apiVersion: v1
kind: Secret
metadata:
  name: supersecret3
  namespace: default

data:
  tls.crt: 
  tls.key: 

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ca-configmap
  namespace: default
data:
  ca.crt: "CA1"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ca-configmap-2
  namespace: default
data:
  ca.crt: "CA2"

---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: my-gateway-class
spec:
  controllerName: traefik.io/gateway-controller

# Three listeners exercise the three frontend validation outcomes:
# - https (443): Default validation, valid CA, AllowValidOnly.
# - https2 (8443): PerPort override, valid CA, AllowInsecureFallback.
# - https3 (9443): PerPort override with an unresolvable CA ref: no valid CA
#   certificate can be resolved, so the listener fails closed with a
#   RequireAndVerifyClientCert option that has no CAFiles (can never be
#   satisfied) instead of silently skipping client-cert enforcement.
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: my-gateway
  namespace: default
spec:
  gatewayClassName: my-gateway-class
  tls:
    frontend:
      default:
        validation:
          mode: AllowValidOnly
          caCertificateRefs:
            - kind: ConfigMap
              name: ca-configmap
              group: ""
      perPort:
        - port: 8443
          tls:
            validation:
              mode: AllowInsecureFallback
              caCertificateRefs:
                - kind: ConfigMap
                  name: ca-configmap-2
                  group: ""
        - port: 9443
          tls:
            validation:
              mode: AllowValidOnly
              caCertificateRefs:
                - kind: ConfigMap
                  name: does-not-exist
                  group: ""
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        certificateRefs:
          - kind: Secret
            name: supersecret
            group: ""
      allowedRoutes:
        namespaces:
          from: Same
    - name: https2
      protocol: HTTPS
      port: 8443
      tls:
        certificateRefs:
          - kind: Secret
            name: supersecret2
            group: ""
      allowedRoutes:
        namespaces:
          from: Same
    - name: https3
      protocol: HTTPS
      port: 9443
      tls:
        certificateRefs:
          - kind: Secret
            name: supersecret3
            group: ""
      allowedRoutes:
        namespaces:
          from: Same
