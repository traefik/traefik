---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: my-gateway-class
spec:
  controllerName: traefik.io/gateway-controller

---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: my-gateway
  namespace: default
spec:
  gatewayClassName: my-gateway-class
  listeners: # Use GatewayClass defaults for listener definition.
    - name: web
      protocol: HTTP
      port: 80
      allowedRoutes:
        kinds:
          - kind: GRPCRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Same

---
kind: GRPCRoute
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: grpc-app-1
  namespace: default
spec:
  parentRefs:
    - name: my-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - foo.com
  rules:
    - backendRefs:
        - name: whoami
          port: 80
          weight: 1

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-ca
  namespace: default
data:
  ca.crt: |
    CA1
    CA2

---
kind: BackendTLSPolicy
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: backend-tls-policy
  namespace: default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: whoami
  validation:
    hostname: whoami
    caCertificateRefs:
      - name: backend-ca
        group: ""
        kind: ConfigMap
