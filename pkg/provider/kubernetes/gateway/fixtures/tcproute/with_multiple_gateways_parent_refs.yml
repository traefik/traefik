---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: my-gateway-class
spec:
  controllerName: traefik.io/gateway-controller

---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: other-gateway-class
spec:
  controllerName: example.com/other-controller

---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: my-tcp-gateway
  namespace: default
spec:
  gatewayClassName: my-gateway-class
  listeners:
    - name: tcp
      protocol: TCP
      port: 9000
      allowedRoutes:
        kinds:
          - kind: TCPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Same

---
# Gateway owned by another controller. Traefik must ignore it, and must not write
# any status for parentRefs pointing to it.
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: other-tcp-gateway
  namespace: default
spec:
  gatewayClassName: other-gateway-class
  listeners:
    - name: tcp
      protocol: TCP
      port: 9000
      allowedRoutes:
        kinds:
          - kind: TCPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Same

---
# References both our Gateway and the foreign one: only our parent must be managed,
# and the listener must count this route only once.
kind: TCPRoute
apiVersion: gateway.networking.k8s.io/v1alpha2
metadata:
  name: tcp-app-1
  namespace: default
spec:
  parentRefs:
    - name: my-tcp-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
    - name: other-tcp-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - backendRefs:
        - name: whoamitcp
          port: 9000
          weight: 1
          kind: Service
          group: ""

---
# References only the foreign Gateway: Traefik must not write any status for it.
kind: TCPRoute
apiVersion: gateway.networking.k8s.io/v1alpha2
metadata:
  name: tcp-app-2
  namespace: default
spec:
  parentRefs:
    - name: other-tcp-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - backendRefs:
        - name: whoamitcp
          port: 9000
          weight: 1
          kind: Service
          group: ""
